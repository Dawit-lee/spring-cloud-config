server:
  port: 8000
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defalut-zone: http://localhost:8761/eureka/
spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: department-service
            uri: lb://department-service
            predicates:
            - Path=/department/**
            filters:
            - RewritePath=/department/(?<path>.*), /$\{path}
  
